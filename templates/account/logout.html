{% extends "base.html" %}
{% load static %}

{% block title %}Sign Out - MediaShare{% endblock %}

{% block extra_head %}
<link rel="icon" type="image/jpg" href="{% static 'images/18+.jpg' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{% static 'images/18+.jpg' %}" alt="MediaShare" style="width: 80px; height: 80px; margin-bottom: 16px; border-radius: 50%;">
            <h1>Sign out</h1>
            <p>Are you sure you want to sign out?</p>
        </div>
        
        <form method="POST" action="{% url 'account_logout' %}" class="auth-form">
            {% csrf_token %}
            
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
            {% endif %}
            
            <button type="submit" class="btn btn-danger btn-block">Sign Out</button>
            <a href="{% url 'frontend:feed' %}" class="btn btn-secondary btn-block" style="margin-top: 12px;">Cancel</a>
        </form>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    
    .auth-card {
        max-width: 450px;
        width: 100%;
        background: rgba(15, 25, 45, 0.65);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 20px;
        padding: 40px 32px;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 32px;
    }
    
    .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #f1f5f9, #60a5fa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
    }
    
    .auth-header p {
        color: #94a3b8;
        font-size: 14px;
    }
    
    .btn-block {
        width: 100%;
        justify-content: center;
    }
    
    .btn-danger {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        border-color: #ef4444;
        color: white;
        padding: 12px 20px;
    }
    
    .btn-danger:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4);
    }
    
    .btn-secondary {
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #cbd5e1;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
    }
    
    .btn-secondary:hover {
        background: rgba(59, 130, 246, 0.25);
        transform: translateY(-1px);
    }
</style>
{% endblock %}
