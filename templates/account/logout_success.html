{% extends "base.html" %}
{% load static %}

{% block title %}Logged Out - MediaShare{% endblock %}

{% block extra_head %}
<link rel="icon" type="image/jpg" href="{% static 'images/18+.jpg' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{% static 'images/18+.jpg' %}" alt="MediaShare" style="width: 80px; height: 80px; margin-bottom: 16px; border-radius: 50%;">
            <h1>You've been logged out</h1>
            <p>Thank you for using MediaShare</p>
        </div>
        
        <div class="success-message">
            <p>You have successfully signed out.</p>
        </div>
        
        <div class="auth-footer">
            <a href="{% url 'account_login' %}" class="btn btn-primary btn-block">Sign in again</a>
            <a href="{% url 'frontend:home' %}" class="btn btn-secondary btn-block" style="margin-top: 12px;">Return to home</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    
    .auth-card {
        max-width: 450px;
        width: 100%;
        background: rgba(15, 25, 45, 0.65);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 20px;
        padding: 40px 32px;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 24px;
    }
    
    .auth-header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #f1f5f9, #60a5fa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 8px;
    }
    
    .auth-header p {
        color: #94a3b8;
        font-size: 14px;
    }
    
    .success-message {
        text-align: center;
        padding: 20px;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        border-radius: 12px;
        margin-bottom: 24px;
    }
    
    .success-message p {
        color: #4ade80;
        font-size: 14px;
    }
    
    .btn-block {
        width: 100%;
        justify-content: center;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        padding: 12px 20px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
    }
    
    .btn-secondary {
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #cbd5e1;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 8px;
    }
    
    .btn-secondary:hover {
        background: rgba(59, 130, 246, 0.25);
        transform: translateY(-1px);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid rgba(59, 130, 246, 0.2);
    }
</style>
{% endblock %}
