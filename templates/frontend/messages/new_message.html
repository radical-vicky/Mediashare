{% extends "base.html" %}

{% block title %}New Message - MediaShare{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin: 0 auto; padding: 48px 24px;">
    <div class="card" style="padding: 32px;">
        <div class="text-center mb-4">
            <i class="fas fa-envelope" style="font-size: 48px; color: #2f81f7; margin-bottom: 16px; display: block;"></i>
            <h1 style="font-size: 1.5rem; font-weight: 600;">New Message</h1>
            <p class="text-muted" style="font-size: 0.875rem;">Start a conversation with another user</p>
        </div>
        
        <form method="POST" id="messageForm">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label class="form-label">To:</label>
                {% if username %}
                    <input type="text" name="username" class="form-control" value="{{ username }}" readonly style="background: #0d1117; cursor: not-allowed;">
                {% else %}
                    <input type="text" name="username" id="username" class="form-control" placeholder="Enter username" required autocomplete="off">
                    <div id="suggestions" style="display: none; margin-top: 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; max-height: 200px; overflow-y: auto;"></div>
                {% endif %}
            </div>
            
            <div style="margin-bottom: 20px;">
                <label class="form-label">Subject:</label>
                <input type="text" name="subject" class="form-control" placeholder="What's this about?" required>
            </div>
            
            <div style="margin-bottom: 24px;">
                <label class="form-label">Message:</label>
                <textarea name="content" class="form-control" rows="6" placeholder="Type your message here..." required></textarea>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" style="flex: 1;">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
                <a href="{% url 'frontend:inbox' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% if not username %}
<script>
    const usernameInput = document.getElementById('username');
    const suggestionsDiv = document.getElementById('suggestions');
    let searchTimeout;
    
    usernameInput.addEventListener('input', function() {
        const query = this.value.trim();
        
        clearTimeout(searchTimeout);
        
        if (query.length < 2) {
            suggestionsDiv.style.display = 'none';
            return;
        }
        
        searchTimeout = setTimeout(() => {
            fetch(`/api/users/all/`, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                const users = data.users.filter(user => 
                    user.username.toLowerCase().includes(query.toLowerCase())
                );
                
                if (users.length > 0) {
                    suggestionsDiv.innerHTML = users.map(user => `
                        <div class="suggestion-item" data-username="${user.username}" style="padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #21262d;">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                ${user.avatar ? `<img src="${user.avatar}" style="width: 32px; height: 32px; border-radius: 50%;">` : '<div style="width: 32px; height: 32px; background: #21262d; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="fas fa-user"></i></div>'}
                                <div>
                                    <div style="font-weight: 500;">${user.username}</div>
                                    ${user.bio ? `<div style="font-size: 0.75rem; color: #7d8590;">${user.bio.substring(0, 50)}</div>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                    suggestionsDiv.style.display = 'block';
                    
                    document.querySelectorAll('.suggestion-item').forEach(item => {
                        item.onclick = function() {
                            usernameInput.value = this.dataset.username;
                            suggestionsDiv.style.display = 'none';
                        };
                    });
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            });
        }, 300);
    });
    
    document.addEventListener('click', function(e) {
        if (!usernameInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
            suggestionsDiv.style.display = 'none';
        }
    });
</script>
{% endif %}
{% endblock %}
