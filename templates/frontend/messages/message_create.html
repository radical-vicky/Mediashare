{% extends 'base.html' %}

{% block title %}New Message - MediaShare{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="new-message-card">
                <div class="new-message-header">
                    <h1 class="new-message-title">New Message</h1>
                </div>
                <div class="new-message-body">
                    <form method="POST" class="message-form">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label class="form-label">To</label>
                            <div class="recipient-display">
                                <div class="recipient-avatar">
                                    {% if recipient.profile.avatar %}
                                        <img src="{{ recipient.profile.avatar.url }}" alt="{{ recipient.username }}">
                                    {% else %}
                                        <div class="avatar-initial">{{ recipient.username|first|upper }}</div>
                                    {% endif %}
                                </div>
                                <div class="recipient-name">{{ recipient.username }}</div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="subject" class="form-label">Subject</label>
                            <input type="text" name="subject" id="subject" class="form-control" placeholder="Enter message subject" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="content" class="form-label">Message</label>
                            <textarea name="content" id="content" class="form-control" rows="6" placeholder="Type your message here..." required></textarea>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-block">Send Message</button>
                            <a href="{% url 'frontend:inbox' %}" class="btn btn-secondary btn-block">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.new-message-card {
    background: rgba(20, 25, 55, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 24px;
    overflow: hidden;
    margin-top: 24px;
}

.new-message-header {
    padding: 24px 32px;
    background: rgba(10, 14, 39, 0.6);
    border-bottom: 1px solid rgba(59, 130, 246, 0.15);
}

.new-message-title {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin: 0;
}

.new-message-body {
    padding: 32px;
}

.form-group {
    margin-bottom: 24px;
}

.form-label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    font-size: 14px;
    color: #cbd5e1;
}

.recipient-display {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    border: 1px solid rgba(59, 130, 246, 0.15);
}

.recipient-avatar img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.avatar-initial {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    color: white;
}

.recipient-name {
    font-size: 16px;
    font-weight: 600;
    color: white;
}

.form-control {
    width: 100%;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(59, 130, 246, 0.2);
    border-radius: 12px;
    padding: 12px 16px;
    color: white;
    font-family: inherit;
    font-size: 14px;
    transition: all 0.2s ease;
}

.form-control:focus {
    outline: none;
    border-color: #3b82f6;
    background: rgba(255, 255, 255, 0.08);
}

.form-control::placeholder {
    color: #64748b;
}

textarea.form-control {
    resize: vertical;
    font-family: inherit;
}

.form-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
}

.btn {
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    font-family: inherit;
}

.btn-block {
    flex: 1;
}

.btn-primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
}

/* Loading state for button */
.btn-primary.loading {
    opacity: 0.7;
    cursor: not-allowed;
}

/* Responsive */
@media (max-width: 768px) {
    .new-message-header {
        padding: 20px;
    }
    
    .new-message-body {
        padding: 20px;
    }
    
    .form-actions {
        flex-direction: column;
    }
}
</style>

<script>
// Form submission loading state
const messageForm = document.querySelector('.message-form');
if (messageForm) {
    messageForm.addEventListener('submit', function() {
        const submitBtn = this.querySelector('.btn-primary');
        if (submitBtn) {
            submitBtn.classList.add('loading');
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
        }
    });
}

// Auto-resize textarea (optional)
const textarea = document.getElementById('content');
if (textarea) {
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
}
</script>
{% endblock %}
